<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Static neuromarketing research prototype for GitHub Pages using WebGazer.js and client-side heatmaps."
    />
    <title>Neuromarketing Visual Design Study</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css?v=20260418c" />
    <script
      src="./js/lib/webgazer.js?v=20260418c"
      defer
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/heatmap.js-fixed@2.0.2/build/heatmap.min.js"
      defer
    ></script>
    <script type="module" src="./js/app.js?v=20260418c"></script>
  </head>
  <body>
    <noscript>
      <div class="noscript-banner">
        JavaScript is required to run this research prototype.
      </div>
    </noscript>

    <div class="site-shell">
      <header class="site-header">
        <div class="site-header__meta">
          <p class="eyebrow">Academic Research Prototype</p>
          <h1 id="study-title">Neuromarketing Visual Design Study</h1>
          <p id="study-subtitle" class="site-subtitle">
            Browser-based eye tracking and spending-choice tasks.
          </p>
        </div>

        <div class="site-header__status">
          <div class="progress-card">
            <div class="progress-card__row">
              <span id="progress-label">Step 1 of 8</span>
              <span id="page-label">Introduction</span>
            </div>
            <div class="progress-track" aria-hidden="true">
              <div id="progress-bar" class="progress-track__fill"></div>
            </div>
          </div>

          <div id="tracking-status" class="status-pill status-pill--idle">
            Awaiting consent
          </div>
        </div>
      </header>

      <div id="global-alert" class="global-alert hidden" role="alert"></div>

      <main id="app" class="app-shell" tabindex="-1"></main>
    </div>

    <aside id="admin-drawer" class="admin-drawer hidden" aria-label="Admin debug tools"></aside>
  </body>
</html>
